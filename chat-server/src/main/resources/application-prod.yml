spring:
  frontend:
    url: ${FRONT_END_URL}
    
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS} # ex) my-kafka.kafka.svc.cluster.local:9092
    properties:
      security.protocol: SASL_SSL
      sasl.mechanism: SCRAM-SHA-256
      sasl.jaas.config: >
        org.apache.kafka.common.security.scram.ScramLoginModule required
        username="user1" password="${KAFKA_PASSWORD}";
      ssl.truststore.location: /app/config/kafka.truststore.jks
      ssl.truststore.password: ${KAFKA_TRUSTSTORE_PASSWORD}
      ssl.truststore.type: JKS
    consumer:
      auto-offset-reset: earliest
      enable-auto-commit: false
        
    producer:
      acks: all
      retries: ${KAFKA_PRODUCER_RETRIES:2147483647}
      properties:
        enable.idempotence: true

  datasource:
    url: ${DB_URL}          # ex) jdbc:postgresql://postgres.default.svc.cluster.local:5432/chatdb
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  redis:
    host: ${REDIS_HOST}     # ex) my-redis-master.redis.svc.cluster.local
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD}          # ← 필요
    username: ${REDIS_USERNAME:default} 

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}   # prod 기본: validate
    properties:
      hibernate:
        show_sql: ${JPA_SHOW_SQL:false}
        format_sql: ${JPA_FORMAT_SQL:false}

  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    baseline-on-migrate: ${FLYWAY_BASELINE_ON_MIGRATE:true}
    locations: classpath:db/migration

logging:
  level:
    org.hibernate.SQL: OFF
    org.hibernate.type.descriptor.sql: OFF
    root: ${LOG_ROOT_LEVEL:info}
    org.springframework: ${LOG_SPRING_LEVEL:info}
    com.sns.project: ${LOG_APP_LEVEL:info}

jwt:
  expiration: ${JWT_EXPIRATION:900000}   # 15m
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}   # 7d
  secret: ${JWT_SECRET}                    # 반드시 Secret로 주입

app:
  auth:
    cookie:
      access-token-name: ${AUTH_COOKIE_NAME:ACCESS_TOKEN}
      refresh-token-name: ${AUTH_REFRESH_COOKIE_NAME:REFRESH_TOKEN}
      csrf-token-name: ${AUTH_CSRF_COOKIE_NAME:XSRF-TOKEN}
      secure: ${AUTH_COOKIE_SECURE:true}
      http-only: true
      same-site: ${AUTH_COOKIE_SAME_SITE:Lax}
      path: /
      domain: ${AUTH_COOKIE_DOMAIN:}
      max-age-seconds: ${AUTH_COOKIE_MAX_AGE_SECONDS:900}
      refresh-max-age-seconds: ${AUTH_REFRESH_COOKIE_MAX_AGE_SECONDS:604800}
  kafka:
    topics:
      chat-message-created: ${KAFKA_TOPIC_CHAT_MESSAGE_CREATED:chat.message.created}
      chat-room-read: ${KAFKA_TOPIC_CHAT_ROOM_READ:chat.room.read}
  outbox:
    relay:
      fixed-delay-ms: ${OUTBOX_RELAY_FIXED_DELAY_MS:1000}
      batch-size: ${OUTBOX_RELAY_BATCH_SIZE:100}
      max-retry-count: ${OUTBOX_RELAY_MAX_RETRY_COUNT:10}

springdoc:
  api-docs:
    enabled: ${SPRINGDOC_API_DOCS_ENABLED:false}    # prod 기본 비활성
  swagger-ui:
    enabled: ${SPRINGDOC_SWAGGER_UI_ENABLED:false}  # prod 기본 비활성
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    display-request-duration: true
